      .highlight { fill: #FFFFFF; }
      .accent { fill: #31162B; }
    </style>
  </defs>
  
    <g transform="translate(25, 25) scale(0.7)">
      <path d="M0 -10 Q0 0 10 0 Q0 0 0 10 Q0 0 -10 0 Q0 0 0 -10 Z" fill="#EF476F"/>
      <circle cx="15" cy="-15" r="3" fill="#EF476F"/>
    </g>
  
    <g transform="translate(80, 40) scale(0.5)">
      <path d="M0 -10 Q0 0 10 0 Q0 0 0 10 Q0 0 -10 0 Q0 0 0 -10 Z" fill="#FFD166"/>
      
    </g>
  
  
    <g>
      <!-- Base Flame -->
      <path class="filled" fill="#EF476F" d="M50 15 C50 15, 25 40, 25 65 C25 80, 35 90, 50 90 C65 90, 75 80, 75 65 C75 40, 50 15, 50 15 Z" />
